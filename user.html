  <style>
    html {
      background: #111315;
      color-scheme: dark;

    body {
      margin: 0;
      min-height: 100vh;
      background: #111315;
      color: #f2f2f2;
      font-family: 'PT Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html:not(.app-ready) body {
      overflow: hidden;
    }

    html:not(.app-ready) .page,
    html:not(.app-ready) #sharedFooterMount {
      visibility: hidden;
    }

    .app-boot-shell {
      position: fixed;
      inset: 0;
      z-index: 2147483647;
      box-sizing: border-box;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #111315;
      color: #f2f2f2;
      font-family: 'PT Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html.app-ready .app-boot-shell {
      display: none;
    }

    .app-boot-shell-card {
      display: grid;
      justify-items: center;
      gap: 16px;
      text-align: center;
    }

    .app-boot-logo {
      font-family: 'Unbounded', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: clamp(24px, 7vw, 34px);
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #ffffff;
    }

    .app-boot-shell-line {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 24px;
      color: #cfd6de;
      font-size: 15px;
    }

    .app-boot-shell-spinner {
      width: 18px;
      height: 18px;
      box-sizing: border-box;
      border: 2px solid rgba(154, 163, 173, 0.28);
      border-top-color: #5b8cff;
      border-radius: 50%;
      animation: app-boot-spin 0.8s linear infinite;
    }

    .app-boot-shell-error {
      display: none;
      max-width: 360px;
      color: #ffd9d4;
      font-size: 14px;
      line-height: 1.45;
    }

    html.app-load-failed .app-boot-shell-line {
      display: none;
    }

    html.app-load-failed .app-boot-shell-error {
      display: block;
    }

    @keyframes app-boot-spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .app-boot-shell-spinner {
        animation: none;
      }
    }
  </style>

  <script src="/boot-loader.js?v=19"></script>
