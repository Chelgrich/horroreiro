<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отслеживаемые — Хоррорейро</title>

  <meta name="description" content="Отслеживаемые профили и лента активности на Хоррорейро.">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#111315">

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://uogzcozbnosfguyfbvhe.supabase.co" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">

  <style>
    html {
      background: #111315;
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #111315;
      color: #f2f2f2;
      font-family: 'PT Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html:not(.app-ready) body {
      overflow: hidden;
    }

    html:not(.app-ready) .page,
    html:not(.app-ready) #sharedFooterMount {
      visibility: hidden;
    }

    .app-boot-shell {
      position: fixed;
      inset: 0;
      z-index: 2147483647;
      box-sizing: border-box;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #111315;
      color: #f2f2f2;
      font-family: 'PT Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html.app-ready .app-boot-shell {
      display: none;
    }

    .app-boot-shell-card {
      display: grid;
      justify-items: center;
      gap: 16px;
      text-align: center;
    }

    .app-boot-logo {
      font-family: 'Unbounded', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: clamp(24px, 7vw, 34px);
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #ffffff;
    }

    .app-boot-shell-line {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 24px;
      color: #cfd6de;
      font-size: 15px;
    }

    .app-boot-shell-spinner {
      width: 18px;
      height: 18px;
      box-sizing: border-box;
      border: 2px solid rgba(154, 163, 173, 0.28);
      border-top-color: #5b8cff;
      border-radius: 50%;
      animation: app-boot-spin 0.8s linear infinite;
    }

    .app-boot-shell-error {
      display: none;
      max-width: 360px;
      color: #ffd9d4;
      font-size: 14px;
      line-height: 1.45;
    }

    html.app-load-failed .app-boot-shell-line {
      display: none;
    }

    html.app-load-failed .app-boot-shell-error {
      display: block;
    }

    @keyframes app-boot-spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .app-boot-shell-spinner {
        animation: none;
      }
    }
  </style>

  <script>
    window.__ENV_READY__ = new Promise(resolve => {
      const isLocalFile = window.location.protocol === 'file:';
      const isLocalHost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
      const shouldUseLocalDevEnv = isLocalFile || isLocalHost;
      let hasStartedStylesheetLoad = false;
      let isEnvReadyResolved = false;
      let envFallbackTimer = null;
      let stylesheetFallbackTimer = null;

      const localDevEnv = {
        SUPABASE_URL: 'https://uogzcozbnosfguyfbvhe.supabase.co',
        SUPABASE_ANON_KEY: 'sb_publishable_trS_-TlQwFqcM59nELIdsw_ygVI6B0j',
        APP_BUILD_VERSION: 'dev-local'
      };

      function getVersionedAssetUrl(src, buildVersion) {
        const assetPath = window.location.protocol === 'file:' ? src : `/${src}`;

        return `${assetPath}?v=${encodeURIComponent(buildVersion)}`;
      }

      function finishEnvReady() {
        if (isEnvReadyResolved) {
          return;
        }

        isEnvReadyResolved = true;
        window.clearTimeout(stylesheetFallbackTimer);
        document.documentElement.classList.remove('app-load-failed');
        document.documentElement.classList.add('app-ready');
        resolve();
      }

      function markStylesheetFailure() {
        if (isEnvReadyResolved) {
          return;
        }

        document.documentElement.classList.add('app-load-failed');
      }

      function applyEnvAndLoadStyles() {
        if (hasStartedStylesheetLoad) {
          return;
        }

        hasStartedStylesheetLoad = true;
        window.clearTimeout(envFallbackTimer);

        const buildVersion = window.__ENV__?.APP_BUILD_VERSION || 'dev';
        const stylesheet = document.createElement('link');

        stylesheet.rel = 'stylesheet';
        stylesheet.href = getVersionedAssetUrl('styles.css', buildVersion);
        stylesheet.onload = finishEnvReady;
        stylesheet.onerror = markStylesheetFailure;
        document.head.appendChild(stylesheet);

        stylesheetFallbackTimer = window.setTimeout(markStylesheetFailure, 10000);
      }

      function applyFallbackEnvAndLoadStyles() {
        if (!window.__ENV__) {
          window.__ENV__ = localDevEnv;
        }

        applyEnvAndLoadStyles();
      }

      if (shouldUseLocalDevEnv) {
        window.__ENV__ = localDevEnv;
        applyEnvAndLoadStyles();
        return;
      }

      const envScript = document.createElement('script');
      envScript.src = '/env';
      envScript.onload = applyEnvAndLoadStyles;
      envScript.onerror = applyFallbackEnvAndLoadStyles;
      envFallbackTimer = window.setTimeout(applyFallbackEnvAndLoadStyles, 2500);

      document.head.appendChild(envScript);
    });
  </script>
</head>

<body>
  <div id="appBootShell" class="app-boot-shell" role="status" aria-live="polite">
    <div class="app-boot-shell-card">
      <div class="app-boot-logo">Хоррорейро</div>
      <div class="app-boot-shell-line">
        <span class="app-boot-shell-spinner" aria-hidden="true"></span>
        <span>Загружаем интерфейс...</span>
      </div>
      <div class="app-boot-shell-error">
        Не удалось загрузить оформление. Обновите страницу.
      </div>
    </div>
  </div>

  <main class="page following-page-shell">
    <div id="sharedHeaderMount"></div>

    <div id="sharedAuthModalMount"></div>

    <div id="sharedDisplayNameModalMount"></div>

    <section class="section following-page">
      <a href="/" class="secondary-button user-page-back-link"><span class="back-link-arrow" aria-hidden="true">←</span><span>Назад в каталог</span></a>
      <h1 class="following-page-main-title">Отслеживаемые</h1>

      <div id="followingPage" class="following-page-content-shell">
        <div class="following-page-loading-state">Загрузка отслеживаемых...</div>
      </div>
    </section>
  </main>

  <div id="sharedFooterMount"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    (function () {
      const envReadyPromise = window.__ENV_READY__ || Promise.resolve();

      function loadScript(src, buildVersion) {
        return new Promise((resolve, reject) => {
          const script = document.createElement('script');
          const assetPath = window.location.protocol === 'file:' ? src : `/${src}`;

          script.src = `${assetPath}?v=${encodeURIComponent(buildVersion)}`;
          script.onload = resolve;
          script.onerror = reject;
          document.body.appendChild(script);
        });
      }

      envReadyPromise
        .then(() => {
          const buildVersion = window.__ENV__?.APP_BUILD_VERSION || 'dev';
          return loadScript('shared-layout.js', buildVersion)
            .then(() => {
              window.SharedLayout?.mountSharedHeader({ isMoviePage: false, useLogoHeading: false });
              window.SharedLayout?.mountSharedAuthModal();
              window.SharedLayout?.mountSharedDisplayNameModal();
              window.SharedLayout?.mountSharedFooter();
            })
            .then(() => loadScript('app.js', buildVersion));
        })
        .catch(error => {
          console.error('Ошибка загрузки versioned scripts:', error);
        });
    })();
  </script>
</body>

</html>
